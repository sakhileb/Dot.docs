name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Deploy over SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_PATH: ${{ secrets.PROD_APP_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "$PROD_USER@$PROD_HOST" << 'EOF'
          set -e
          cd "$PROD_APP_PATH"

          php artisan down || true

          # Backup before deployment for rapid recovery.
          php artisan backup:create --label=pre-prod-deploy --cleanup

          git fetch --all
          git reset --hard origin/main

          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
          npm ci
          npm run build

          php artisan migrate --force || {
            echo "Migration failed. Rolling back last batch..."
            php artisan migrate:rollback --step=1 --force || true
            php artisan up || true
            exit 1
          }

          php artisan optimize:clear
          php artisan optimize

          php artisan up
          EOF
