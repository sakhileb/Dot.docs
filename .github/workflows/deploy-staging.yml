name: Deploy Staging

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Deploy over SSH
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_PATH: ${{ secrets.STAGING_APP_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "$STAGING_USER@$STAGING_HOST" << 'EOF'
          set -e
          cd "$STAGING_APP_PATH"

          php artisan down || true

          # Pre-deploy backup for rollback safety.
          php artisan backup:create --label=pre-deploy --cleanup

          git fetch --all
          git reset --hard origin/main

          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
          npm ci
          npm run build

          # Migration strategy with guarded rollback.
          php artisan migrate --force || {
            echo "Migration failed. Rolling back last batch..."
            php artisan migrate:rollback --step=1 --force || true
            php artisan up || true
            exit 1
          }

          php artisan optimize:clear
          php artisan optimize

          php artisan up
          EOF
